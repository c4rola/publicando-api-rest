spring:
  datasource:
    url: jdbc:h2:mem:sdw2023 #nome do banco sdw2023
    username: sdw2023
    password:
  jpa:
    show-sql: true #deixar queries mais verbosa e aparecer no log
    open-in-view: false
    hibernate:
      ddl-auto: create #pro hibernate criar as tabelas # validate | update | create | create-drop
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console #para conseguir acessar o banco via browser, acessar localhost:8080/h2-console
      settings:
        trace: false
        web-allow-others: false